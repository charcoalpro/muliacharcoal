name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint & format check (advisory)
        # Biome was added late — surface issues without blocking the build
        # for the first two weeks. Flip `continue-on-error: false` once the
        # backlog is clean.
        continue-on-error: true
        run: npm run check

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
